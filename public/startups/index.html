<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Concepts | Chris Wyatt</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --bg-color: #0F172A;
            --text-primary: #E2E8F0;
            --text-secondary: #94A3B8;
            --accent-gold: #D4AF37;
            --accent-emerald: #10B981;
            --accent-sapphire: #2563EB;
            --border-color: #1E293B;
            --card-bg: #1E293B;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 4rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-weight: 300;
            letter-spacing: -0.02em;
            margin: 0;
            font-size: 2.5rem;
            color: var(--text-primary);
        }

        .subtitle {
            color: var(--accent-gold);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.875rem;
            margin-top: 1rem;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        #startups-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 4px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            border-color: var(--accent-sapphire);
            transform: translateY(-2px);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .pitch {
            font-size: 1.125rem;
            color: var(--accent-emerald);
            margin-bottom: 2rem;
            font-weight: 400;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .section-content {
            font-size: 0.95rem;
            color: var(--text-primary);
            margin: 0;
        }
        
        .footer {
            text-align: center;
            padding: 3rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Portfolio Concepts</h1>
        <div class="subtitle">Investment Thesis & Opportunities</div>
    </header>

    <main>
        <div id="startups-container"></div>
    </main>
    
    <footer class="footer">
        Confidential & Proprietary.
    </footer>

    <script src="data.js"></script>
    <script>
        function renderStartups() {
            var container = document.getElementById('startups-container');
            
            STARTUP_DATA.forEach(function(startup) {
                var card = document.createElement('div');
                card.className = 'card';
                card.id = startup.id;
                
                var html = '<h2>' + startup.name + '</h2>';
                html += '<div class="pitch">' + startup.pitch + '</div>';
                
                html += '<div class="section-title">Mission</div>';
                html += '<p class="section-content">' + startup.mission + '</p>';
                
                html += '<div class="section-title">Vision</div>';
                html += '<p class="section-content">' + startup.vision + '</p>';
                
                html += '<div class="section-title">Values</div>';
                html += '<p class="section-content">' + startup.values + '</p>';
                
                html += '<div class="section-title">Opportunity</div>';
                html += '<p class="section-content">' + startup.opportunity + '</p>';
                
                html += '<div class="section-title">Moat</div>';
                html += '<p class="section-content">' + startup.moat + '</p>';
                
                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', renderStartups);
    </script>
</body>
</html>
